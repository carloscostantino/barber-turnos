# Producción: PostgreSQL + API + front estático (nginx) + Caddy (TLS).
# Uso: copiá deploy/env.production.example a `.env` en la raíz del repo,
# completá valores, luego: docker compose -f docker-compose.prod.yml up -d --build
#
# Documentación: docs/deploy-oracle-free.md

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-barber_turnos}
      POSTGRES_USER: ${POSTGRES_USER:-barber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD en .env}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [app]

  api:
    build: ./server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TRUST_PROXY: '1'
      PORT: '3001'
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '3001'
    networks: [app]

  web:
    build:
      context: .
      dockerfile: client/Dockerfile.prod
      args:
        VITE_API_BASE: ${VITE_API_BASE:?Definí VITE_API_BASE en .env (p. ej. https://turnos.ejemplo.com/api)}
    restart: unless-stopped
    expose:
      - '80'
    networks: [app]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?Definí PUBLIC_HOST en .env (FQDN, sin https://)}
    volumes:
      # Una sola hostname: Caddyfile (default). Apex + www: CADDY_DOCKERFILE=Caddyfile.apex en .env
      - ./deploy/${CADDY_DOCKERFILE:-Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    networks: [app]

networks:
  app:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:
